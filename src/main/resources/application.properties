spring.application.name=TechShop

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/techshopdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

jwt.secret-key=${JWT_SECRET_KEY}
jwt.access.expiration_time=${JWT_ACCESS_EXPIRATION_TIME}
jwt.refresh.expiration_time=${JWT_REFRESH_EXPIRATION_TIME}

security.public-endpoints=/api/v1/auth/**,/api/v1/upload
security.user-endpoints=/api/v1/users/**
security.admin-endpoints=/api/v1/admin/**

#╔p c?u hņnh Dialect v? ?·ng MariaDB
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect